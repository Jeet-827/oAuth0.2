<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f6df6"/>
      <stop offset="100%" stop-color="#1f4fd1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="100" ry="100" fill="url(#bgGradient)"/>

  <!-- Subtle shadow -->
  <rect x="20" y="20" width="472" height="472" rx="90" ry="90" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="10"/>

  <!-- Letter R -->
  <text x="50%" y="55%" text-anchor="middle" fill="white"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="240"
        dominant-baseline="middle">
    R
  </text>
</svg>